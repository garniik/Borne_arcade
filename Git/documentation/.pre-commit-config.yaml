# Configuration pre-commit pour Docs-as-Code
repos:
  # Lint Markdown
  - repo: https://github.com/markdownlint/markdownlint
    rev: v0.12.0
    hooks:
      - id: markdownlint
        args: [--config=.markdownlint.json]
        exclude: 'CHANGELOG\.md'

  # Lint Python (docstrings)
  - repo: https://github.com/pycqa/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        args: [--convention=google]
        exclude: 'tests/.*'

  # Vérification des liens
  - repo: local
    hooks:
      - id: check-doc-links
        name: Check documentation links
        entry: python documentation/tests/test_links.py
        language: system
        pass_filenames: false
        always_run: true

  # Couverture documentation
  - repo: local
    hooks:
      - id: check-doc-coverage
        name: Check documentation coverage
        entry: python documentation/scripts/ia-doc-coverage.py
        args: [--threshold, '0.8']
        language: system
        pass_filenames: false
        always_run: true

  # Vérification des exemples de code
  - repo: local
    hooks:
      - id: check-code-examples
        name: Check code examples syntax
        entry: python -c "
import ast
import sys
import re
from pathlib import Path

def check_examples():
    errors = []
    for md_file in Path('documentation/src').rglob('*.md'):
        content = md_file.read_text(encoding='utf-8')
        code_blocks = re.findall(r'```python\n(.*?)\n```', content, re.DOTALL)
        
        for i, code in enumerate(code_blocks):
            try:
                ast.parse(code)
            except SyntaxError as e:
                errors.append(f'{md_file}:{i+1}: {e}')
    
    if errors:
        print('❌ Erreurs de syntaxe dans les exemples:')
        for error in errors:
            print(f'  {error}')
        sys.exit(1)
    else:
        print('✅ Tous les exemples Python sont syntaxiquement valides')

check_examples()
"
        language: system
        pass_filenames: false
        always_run: true

  # Formatage YAML
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
        exclude: '\.md$'

  # Vérification des templates
  - repo: local
    hooks:
      - id: check-templates
        name: Check PR/issue templates
        entry: python -c "
import sys
from pathlib import Path

templates = [
    'documentation/examples/templates/pr_template.md',
    'documentation/examples/templates/issue_template.md'
]

missing = []
for template in templates:
    if not Path(template).exists():
        missing.append(template)

if missing:
    print('❌ Templates manquants:')
    for template in missing:
        print(f'  {template}')
    sys.exit(1)
else:
    print('✅ Tous les templates sont présents')
"
        language: system
        pass_filenames: false
        always_run: true

  # Génération automatique de patches (dry-run)
  - repo: local
    hooks:
      - id: ia-doc-suggestions
        name: IA doc suggestions (dry-run)
        entry: python documentation/scripts/ia-doc-patch.py
        args: [--dry-run, --output, .ia-suggestions.json]
        language: system
        pass_filenames: false
        always_run: true
        stages: [commit]
