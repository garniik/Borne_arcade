name: Documentation on PR

on:
  pull_request:
    paths:
      - 'src/**'
      - 'games/**'
      - 'documentation/**'
    types: [opened, synchronize, reopened]

jobs:
  doc-patch:
    runs-on: ubuntu-latest
    name: IA Doc Patch
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Nécessaire pour git diff
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
      
      - name: Generate doc patches
        run: |
          python documentation/scripts/ia-doc-patch.py \
            --commit-range ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} \
            --output doc-patches.json
      
      - name: Test documentation
        run: |
          python documentation/scripts/ia-doc-coverage.py \
            documentation/src/ \
            --output coverage-report.json \
            --threshold 0.8
      
      - name: Comment PR with patches
        if: steps.patch.outputs.has-changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Lire le rapport de patches
            const patchReport = JSON.parse(fs.readFileSync('doc-patches.json', 'utf8'));
            
            // Créer le commentaire
            const comment = `## 📝 Mises à jour documentation proposées par l'IA
            
            ${patchReport.summary}

            ---
            *Pour appliquer ces changements, mergez la PR après review.*`;
            
            // Ajouter le commentaire
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
      
      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: doc-reports
          path: |
            doc-patches.json
            coverage-report.json
          retention-days: 7

  doc-tests:
    runs-on: ubuntu-latest
    name: Documentation Tests
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest markdown-link-check
      
      - name: Run link checks
        run: |
          find documentation/src -name "*.md" -exec markdown-link-check {} \;
      
      - name: Run doc tests
        run: |
          python -m pytest documentation/tests/ -v
      
      - name: Check markdown lint
        run: |
          pip install markdownlint-cli
          markdownlint documentation/src/**/*.md

  quality-check:
    runs-on: ubuntu-latest
    name: Quality Gates
    needs: [doc-patch, doc-tests]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download reports
        uses: actions/download-artifact@v4
        with:
          name: doc-reports
      
      - name: Check coverage threshold
        run: |
          python -c "
          import json
          with open('coverage-report.json') as f:
              report = json.load(f)
          
          coverage = report['coverage'].get('functions_coverage', 0)
          threshold = 0.8
          
          print(f'Coverage: {coverage:.1%}')
          print(f'Threshold: {threshold:.1%}')
          
          if coverage < threshold:
              print('❌ Coverage below threshold!')
              exit(1)
          else:
              print('✅ Coverage OK')
          "
      
      - name: Status check
        run: |
          echo "✅ All documentation checks passed"
