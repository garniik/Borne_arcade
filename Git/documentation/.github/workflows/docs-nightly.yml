name: Documentation Nightly

on:
  schedule:
    # Tous les jours à 2h du matin (heure UTC)
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  doc-scan:
    runs-on: ubuntu-latest
    name: Nightly Documentation Scan
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pytest markdown-link-check
      
      - name: Run full coverage analysis
        run: |
          python documentation/scripts/ia-doc-coverage.py \
            . \
            --output nightly-coverage.json \
            --threshold 0.85
      
      - name: Generate improvement suggestions
        run: |
          python documentation/scripts/ia-doc-patch.py \
            --commit-range main~10..main \
            --output nightly-patches.json \
            --dry-run
      
      - name: Check links
        run: |
          find documentation/src -name "*.md" -exec markdown-link-check {} \; > link-check.log 2>&1 || true
      
      - name: Run documentation tests
        run: |
          python -m pytest documentation/tests/ --junitxml=test-results.xml
      
      - name: Generate nightly report
        run: |
          python << 'EOF'
          import json
          from datetime import datetime
          
          # Lire les rapports
          with open('nightly-coverage.json') as f:
              coverage = json.load(f)
          
          # Générer le rapport
          report = f"""# 🌙 Nightly Documentation Report
          Généré le {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}
          
          ## 📊 Couverture
          - Fonctions documentées: {coverage['coverage']['functions_documented']}/{coverage['coverage']['functions_total']}
          - Taux de couverture: {coverage['coverage'].get('functions_coverage', 0):.1%}
          - Fichiers avec problèmes: {coverage['summary']['files_with_issues']}/{coverage['summary']['total_files']}
          
          ## 🔍 Problèmes détectés
          """
          
          # Ajouter les suggestions
          if 'suggestions' in coverage:
              report += "\n### 💡 Suggestions d'amélioration\n\n"
              for suggestion in coverage['suggestions']:
                  report += f"- {suggestion}\n"
          
          # Ajouter les problèmes par fichier
          if coverage['files']:
              report += "\n### 📋 Détails par fichier\n\n"
              for file_path, issues in coverage['files'].items():
                  report += f"#### {file_path}\n"
                  for issue_type, issue_list in issues.items():
                      if issue_list and isinstance(issue_list, list):
                          report += f"- {issue_type}: {len(issue_list)}\n"
          
          # Sauvegarder
          with open('nightly-report.md', 'w') as f:
              f.write(report)
          
          print("✅ Rapport généré")
          EOF
      
      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: nightly-docs-report
          path: |
            nightly-coverage.json
            nightly-patches.json
            nightly-report.md
            link-check.log
            test-results.xml
          retention-days: 30

  quality-gates:
    runs-on: ubuntu-latest
    name: Quality Gates Check
    needs: doc-scan
    
    steps:
      - name: Download reports
        uses: actions/download-artifact@v4
        with:
          name: nightly-docs-report
      
      - name: Check quality thresholds
        run: |
          python << 'EOF'
          import json
          import sys
          
          # Lire le rapport de couverture
          with open('nightly-coverage.json') as f:
              coverage = json.load(f)
          
          # Seuils de qualité
          COVERAGE_THRESHOLD = 0.85
          MAX_FILES_WITH_ISSUES = 5
          MAX_TOTAL_ISSUES = 20
          
          # Vérifications
          issues = []
          
          # Couverture
          func_coverage = coverage['coverage'].get('functions_coverage', 0)
          if func_coverage < COVERAGE_THRESHOLD:
              issues.append(f"Coverage trop faible: {func_coverage:.1%} < {COVERAGE_THRESHOLD:.1%}")
          
          # Fichiers avec problèmes
          files_with_issues = coverage['summary']['files_with_issues']
          if files_with_issues > MAX_FILES_WITH_ISSUES:
              issues.append(f"Trop de fichiers avec problèmes: {files_with_issues} > {MAX_FILES_WITH_ISSUES}")
          
          # Total problèmes
          total_issues = coverage['summary']['total_issues']
          if total_issues > MAX_TOTAL_ISSUES:
              issues.append(f"Trop de problèmes totaux: {total_issues} > {MAX_TOTAL_ISSUES}")
          
          # Résultat
          if issues:
              print("❌ Quality gates failed:")
              for issue in issues:
                  print(f"  - {issue}")
              sys.exit(1)
          else:
              print("✅ All quality gates passed")
              print(f"  Coverage: {func_coverage:.1%}")
              print(f"  Files with issues: {files_with_issues}")
              print(f"  Total issues: {total_issues}")
          EOF

  create-issues:
    runs-on: ubuntu-latest
    name: Create Improvement Issues
    needs: [doc-scan, quality-gates]
    if: failure()
    
    steps:
      - name: Download reports
        uses: actions/download-artifact@v4
        with:
          name: nightly-docs-report
      
      - name: Create issue for improvements
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Lire le rapport
            const coverage = JSON.parse(fs.readFileSync('nightly-coverage.json', 'utf8'));
            
            // Créer le corps de l'issue
            const issueBody = `## 📊 Rapport de couverture documentation
            
            **Date:** ${new Date().toISOString().split('T')[0]}
            
            ### 📈 Métriques actuelles
            - **Couverture fonctions:** ${(coverage.coverage.functions_coverage || 0).toLocaleString('fr-FR', {style: 'percent'})}
            - **Fichiers analysés:** ${coverage.summary.total_files}
            - **Fichiers avec problèmes:** ${coverage.summary.files_with_issues}
            - **Problèmes totaux:** ${coverage.summary.total_issues}
            
            ### 🎯 Objectifs
            - Couverture cible: 85%
            - Max fichiers avec problèmes: 5
            - Max problèmes totaux: 20
            
            ### 💡 Actions recommandées
            ${coverage.suggestions ? coverage.suggestions.map(s => `- ${s}`).join('\n') : 'Aucune suggestion'}
            
            ### 📋 Fichiers nécessitant une attention
            ${Object.entries(coverage.files).slice(0, 5).map(([file, issues]) => 
              `**${file}**: ${Object.values(issues).filter(Array.isArray).reduce((sum, arr) => sum + arr.length, 0)} problèmes`
            ).join('\n')}
            
            ---
            *Issue créée automatiquement par le scan nightly de documentation*`;
            
            // Créer l'issue
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📚 Documentation coverage improvement needed`,
              body: issueBody,
              labels: ['documentation', 'improvement', 'auto-generated']
            });

  notify-slack:
    runs-on: ubuntu-latest
    name: Notify Results
    needs: [doc-scan, quality-gates]
    if: always()
    
    steps:
      - name: Download reports
        uses: actions/download-artifact@v4
        with:
          name: nightly-docs-report
      
      - name: Send notification
        run: |
          # Simulation de notification Slack
          echo "🌙 Nightly doc scan completed"
          echo "Status: ${{ needs.quality-gates.result }}"
          
          if [ "${{ needs.quality-gates.result }}" == "success" ]; then
            echo "✅ All quality gates passed"
          else
            echo "❌ Quality gates failed - issues created"
          fi
