# Configuration Docs-as-Code + IA

# Style de documentation
style:
  markdown:
    line_length: 120
    toc: true
    lint_rules:
      - no-trailing-spaces
      - proper-headings
      - link-check
  python_docstrings:
    style: google
    require_returns: true
    require_type_hints: true

# IA configuration
ia:
  enabled: true
  provider: "openai"  # ou "ollama" selon ton stack
  model: "gpt-4"      # ou modèle local
  max_tokens: 2000
  temperature: 0.3

  # Entrées IA minimales (pour limiter fuites)
  inputs:
    include_git_diff: true
    include_related_docs: true
    include_style_guide: true
    exclude_secrets: true
    exclude_tests: true

  # Sorties IA
  outputs:
    patches: true
    pr_summary: true
    coverage_report: true
    release_notes: true

# CI/CD
ci:
  # Triggers
  on_pr: true
  on_main_push: true
  schedule_nightly: "0 2 * * *"  # tous les jours à 2h du mat

  # Checks
  checks:
    - markdown_lint
    - link_check
    - doc_coverage
    - python_docstrings
    - ia_suggestions

  # Publication
  publish:
    provider: "github_pages"
    base_url: "/documentation"
    auto_deploy: true

# Garde-fous
gates:
  require_doc_review: true
  require_tests_pass: true
  require_approval_count: 1
  block_merge_if_doc_fails: true

# Tests
tests:
  link_check:
    external_links: true
    timeout: 10
  coverage:
    min_public_functions_documented: 0.9
    require_examples: true
